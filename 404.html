<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta http-equiv="refresh" content="3;url=https://teamalfasec.github.github.io/win/">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 animate-fade-in">
        <div class="text-red-500 text-6xl mb-4">
            <i class="fas fa-exclamation-triangle animate-bounce"></i>
        </div>

        <h1 class="text-5xl font-extrabold text-white mb-2">404</h1>
        <h2 class="text-xl font-semibold text-gray-300 mb-4">Page Not Found</h2>
        
        <p class="text-gray-400 mb-6">
            Oops! The page you are looking for doesn't exist or has been moved.
        </p>

        <div class="bg-gray-700/50 rounded-lg p-3 border border-gray-600 mb-6">
            <p class="text-sm text-blue-400 font-medium">
                Redirecting to Home in <span id="countdown" class="text-lg font-bold text-white px-1">3</span> seconds...
            </p>
        </div>

        <a href="https://teamalfasec.github.io/win/" class="inline-flex items-center space-x-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg transition-colors duration-150 shadow-md">
            <i class="fas fa-home"></i>
            <span>Go Home Instantly</span>
        </a>
    </div>

    <script>
        let timeLeft = 3;
        const countdownElement = document.getElementById('countdown');
        const targetUrl = "https://teamalfasec.github.io/win/";

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                countdownElement.textContent = timeLeft;
            }
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>
</body>
</html>
